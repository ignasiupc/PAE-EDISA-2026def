slam_toolbox:
  ros__parameters:

    # ── Frames ───────────────────────────────────────────────
    odom_frame:  odom
    map_frame:   map
    base_frame:  base_link
    scan_topic:  /scan
    mode:        mapping        # mapping | localization

    # ── Solver ───────────────────────────────────────────────
    solver_plugin:           solver_plugins::CeresSolver
    ceres_linear_solver:     SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner:    SCHUR_JACOBI
    ceres_trust_strategy:    LEVENBERG_MARQUARDT
    ceres_dogleg_type:       TRADITIONAL_DOGLEG
    ceres_loss_function:     None

    # ── Map ──────────────────────────────────────────────────
    resolution:            0.05    # metres per cell (5 cm)
    max_laser_range:       12.0    # metres — set to your LiDAR's max range
    map_update_interval:   0.5     # seconds between OccupancyGrid publishes
    use_map_saver:         true

    # ── Scan integration thresholds ───────────────────────────
    minimum_travel_distance:  0.10  # m  — add scan after moving this far
    minimum_travel_heading:   0.10  # rad — add scan after rotating this much
    scan_buffer_size:         10
    scan_buffer_maximum_scan_distance: 10.0

    # ── Loop closure ─────────────────────────────────────────
    loop_search_maximum_distance:        3.0
    loop_match_minimum_chain_size:       10
    loop_match_maximum_variance_covariance: 3.0
    loop_match_minimum_response_coarse:  0.35
    loop_match_minimum_response_fine:    0.45
    loop_search_space_dimension:         8.0

    # ── Scan matching (coarse + fine) ─────────────────────────
    correlation_search_space_dimension:       0.5
    correlation_search_space_resolution:      0.01
    correlation_search_space_smear_deviation: 0.10
    fine_search_angle_offset:   0.00349   # ~0.2°
    coarse_search_angle_offset: 0.34906   # ~20°
    coarse_angle_resolution:    0.03491   # ~2°
    minimum_angle_penalty:      0.9
    minimum_distance_penalty:   0.5
    use_response_expansion:     true

    # ── Performance ───────────────────────────────────────────
    use_scan_matching:    true
    use_scan_barycenter:  true
    tf_buffer_duration:   30.0
    stack_size_to_use:    40000000   # 40 MB stack for Ceres

    # ── Interactive mode (used by GCS Save/Reset buttons) ─────
    enable_interactive_mode: true
